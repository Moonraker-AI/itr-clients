# Build → push → migrate → deploy. Triggered by .github/workflows/deploy.yml,
# which auths via WIF and submits this build to the target project's
# Cloud Build.
#
# Substitutions are passed in by the workflow:
#   _PROJECT, _REGION, _SERVICE, _RUNTIME_SA, _CLOUD_SQL_INSTANCE
#
# Migrations run in a Cloud Run Job (`itr-migrate`) that uses the same image
# as the service. The Job mounts the Cloud SQL instance via
# --add-cloudsql-instances (unix socket at /cloudsql/<INSTANCE>) so it does
# not need VPC connector or private-pool plumbing.

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=infra/Dockerfile
      - --tag=$_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:$COMMIT_SHA
      - --tag=$_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:latest
      - --cache-from=$_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq

  - id: migrate-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="$_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:$COMMIT_SHA"
        # `jobs deploy` is upsert: creates the job on first run, updates after.
        gcloud run jobs deploy itr-migrate \
          --image="$$IMAGE" \
          --project=$_PROJECT \
          --region=$_REGION \
          --service-account=$_RUNTIME_SA \
          --set-cloudsql-instances=$_CLOUD_SQL_INSTANCE \
          --set-env-vars=NODE_ENV=production,CLOUD_SQL_INSTANCE=$_CLOUD_SQL_INSTANCE,MIGRATE_VIA_SOCKET=1 \
          --set-secrets=DB_URL=db-url:latest \
          --command=node \
          --args=dist/db/migrate.js \
          --max-retries=0 \
          --task-timeout=300s \
          --cpu=1 \
          --memory=512Mi \
          --network=default \
          --subnet=default \
          --vpc-egress=private-ranges-only

  - id: migrate-execute
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - itr-migrate
      - --project=$_PROJECT
      - --region=$_REGION
      - --wait

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:$COMMIT_SHA
      - --project=$_PROJECT
      - --region=$_REGION
      - --service-account=$_RUNTIME_SA
      - --no-allow-unauthenticated
      - --ingress=all
      - --min-instances=0
      - --max-instances=5
      - --cpu=1
      - --memory=512Mi
      - --concurrency=80
      - --timeout=60s
      # _STRIPE_PUBLISHABLE_KEY is the per-env Stripe publishable key
      # (pk_test_… in dev, pk_live_… in prod). Designed to be browser-
      # visible — not a secret, plain env-var binding is fine.
      # _AUTH_ENABLED + _FIREBASE_* are the M8 Identity Platform bindings.
      # Default empty (auth disabled, no-op fallthrough) until each env is
      # provisioned + the GitHub repo vars FIREBASE_* / AUTH_ENABLED_* are set.
      - --set-env-vars=NODE_ENV=production,CLOUD_SQL_INSTANCE=$_CLOUD_SQL_INSTANCE,STRIPE_PUBLISHABLE_KEY=$_STRIPE_PUBLISHABLE_KEY,AUTH_ENABLED=$_AUTH_ENABLED,FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID,FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN,FIREBASE_API_KEY=$_FIREBASE_API_KEY
      # _GMAIL_SECRETS_PART is "" in dev (no gmail bind → gmail.ts auto-dry-runs)
      # and ",GMAIL_SERVICE_ACCOUNT_KEY=gmail-service-account:latest" in prod.
      # Stripe secrets are always bound; dev points at test-mode values, prod
      # at live-mode (different secret payloads per project).
      - --set-secrets=DB_URL=db-url:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest$_GMAIL_SECRETS_PART
      # Direct VPC egress so the Cloud SQL Node.js Connector can reach the
      # instance's private IP. private-ranges-only keeps public traffic on
      # Cloud Run's default egress (no NAT cost).
      - --network=default
      - --subnet=default
      - --vpc-egress=private-ranges-only

  # Public webhook-only sibling service. Same image, WEBHOOK_ONLY=1
  # toggles server.ts to register only /health + /api/webhooks/stripe.
  # `--allow-unauthenticated` lets Stripe deliver events; everything else
  # 404s, and the Stripe signature is the actual auth.
  - id: webhook-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - itr-stripe-webhook
      - --image=$_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:$COMMIT_SHA
      - --project=$_PROJECT
      - --region=$_REGION
      - --service-account=$_RUNTIME_SA
      - --allow-unauthenticated
      - --ingress=all
      - --min-instances=0
      - --max-instances=3
      - --cpu=1
      - --memory=512Mi
      - --concurrency=80
      - --timeout=30s
      - --set-env-vars=NODE_ENV=production,CLOUD_SQL_INSTANCE=$_CLOUD_SQL_INSTANCE,WEBHOOK_ONLY=1
      - --set-secrets=DB_URL=db-url:latest,STRIPE_SECRET_KEY=stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=stripe-webhook-secret:latest$_GMAIL_SECRETS_PART
      - --network=default
      - --subnet=default
      - --vpc-egress=private-ranges-only

substitutions:
  _GMAIL_SECRETS_PART: ''
  _AUTH_ENABLED: ''
  _FIREBASE_PROJECT_ID: ''
  _FIREBASE_AUTH_DOMAIN: ''
  _FIREBASE_API_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  dynamicSubstitutions: true

images:
  - $_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:latest

timeout: 1800s
