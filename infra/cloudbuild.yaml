# Build → push → migrate → deploy. Triggered by .github/workflows/deploy.yml,
# which auths via WIF and submits this build to the target project's
# Cloud Build.
#
# Substitutions are passed in by the workflow:
#   _PROJECT, _REGION, _SERVICE, _RUNTIME_SA, _CLOUD_SQL_INSTANCE
#
# Migrations run in a Cloud Run Job (`itr-migrate`) that uses the same image
# as the service. The Job mounts the Cloud SQL instance via
# --add-cloudsql-instances (unix socket at /cloudsql/<INSTANCE>) so it does
# not need VPC connector or private-pool plumbing.

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=infra/Dockerfile
      - --tag=$_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:$COMMIT_SHA
      - --tag=$_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:latest
      - --cache-from=$_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq

  - id: migrate-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="$_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:$COMMIT_SHA"
        # `jobs deploy` is upsert: creates the job on first run, updates after.
        gcloud run jobs deploy itr-migrate \
          --image="$$IMAGE" \
          --project=$_PROJECT \
          --region=$_REGION \
          --service-account=$_RUNTIME_SA \
          --set-cloudsql-instances=$_CLOUD_SQL_INSTANCE \
          --set-env-vars=NODE_ENV=production,CLOUD_SQL_INSTANCE=$_CLOUD_SQL_INSTANCE,MIGRATE_VIA_SOCKET=1 \
          --set-secrets=DB_URL=db-url:latest \
          --command=node \
          --args=dist/db/migrate.js \
          --max-retries=0 \
          --task-timeout=300s \
          --cpu=1 \
          --memory=512Mi \
          --network=default \
          --subnet=default \
          --vpc-egress=private-ranges-only

  - id: migrate-execute
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - itr-migrate
      - --project=$_PROJECT
      - --region=$_REGION
      - --wait

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:$COMMIT_SHA
      - --project=$_PROJECT
      - --region=$_REGION
      - --service-account=$_RUNTIME_SA
      - --no-allow-unauthenticated
      - --ingress=all
      - --min-instances=0
      - --max-instances=5
      - --cpu=1
      - --memory=512Mi
      - --concurrency=80
      - --timeout=60s
      - --set-env-vars=NODE_ENV=production,CLOUD_SQL_INSTANCE=$_CLOUD_SQL_INSTANCE
      # _GMAIL_SECRETS_PART is "" in dev (no gmail bind → gmail.ts auto-dry-runs)
      # and ",GMAIL_SERVICE_ACCOUNT_KEY=gmail-service-account:latest" in prod.
      - --set-secrets=DB_URL=db-url:latest$_GMAIL_SECRETS_PART
      # Direct VPC egress so the Cloud SQL Node.js Connector can reach the
      # instance's private IP. private-ranges-only keeps public traffic on
      # Cloud Run's default egress (no NAT cost).
      - --network=default
      - --subnet=default
      - --vpc-egress=private-ranges-only

substitutions:
  _GMAIL_SECRETS_PART: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  dynamicSubstitutions: true

images:
  - $_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$_PROJECT/itr/itr-client-hq:latest

timeout: 1800s
