name: Deploy

# Triggers:
#   push:branches=[main]   → full deploy to dev
#   push:tags=[v*]         → full deploy to prod
#   pull_request           → typecheck + build only (validate the PR
#                            without touching GCP); satisfies the
#                            branch-protection `deploy` required check.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Don't pile up deploys on the same ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # required for WIF (push events only)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Validate every event (PR + push). Catches type errors + build
      # breaks before they reach Cloud Build, and gives PRs a fast
      # required-check signal without GCP plumbing.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Everything below is push-only. PRs never reach Cloud Build, never
      # touch GCP, and don't need the WIF + service-account setup.
      - name: Pick environment
        if: github.event_name != 'pull_request'
        id: env
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "env_name=prod" >> "$GITHUB_OUTPUT"
            echo "project=${{ vars.GCP_PROJECT_ID_PROD }}" >> "$GITHUB_OUTPUT"
            echo "deployer_sa=${{ vars.GCP_DEPLOYER_SA_PROD }}" >> "$GITHUB_OUTPUT"
            echo "runtime_sa=itr-app@${{ vars.GCP_PROJECT_ID_PROD }}.iam.gserviceaccount.com" >> "$GITHUB_OUTPUT"
            echo "cloud_sql_instance=${{ vars.GCP_PROJECT_ID_PROD }}:${{ vars.GCP_REGION }}:itr-postgres-prod" >> "$GITHUB_OUTPUT"
            # Bind the Workspace SA key only in prod. Dev stays in
            # auto-dry-run via gmail.ts when GMAIL_SERVICE_ACCOUNT_KEY is unset.
            echo "gmail_secrets_part=,GMAIL_SERVICE_ACCOUNT_KEY=gmail-service-account:latest" >> "$GITHUB_OUTPUT"
            # Stripe publishable keys are public (Stripe ships them in browser
            # bundles). Plain env-var binding, not Secret Manager.
            echo "stripe_publishable_key=pk_live_51JxjLSDGT6bz5bfXkPu4UjfVHJlGQfv6KuiEFQOoE6TObxef5IBxrxgUsK3UBP027ZEywML8kWU12njCtWDy94A900m17hywYm" >> "$GITHUB_OUTPUT"
            # M8 auth bindings. Project id matches the GCP project; api key +
            # auth domain come from the Firebase web app config (browser-
            # public values). AUTH_ENABLED stays '0' until Identity Platform
            # is fully provisioned in this project.
            echo "firebase_project_id=${{ vars.GCP_PROJECT_ID_PROD }}" >> "$GITHUB_OUTPUT"
            echo "firebase_auth_domain=${{ vars.FIREBASE_AUTH_DOMAIN_PROD }}" >> "$GITHUB_OUTPUT"
            echo "firebase_api_key=${{ vars.FIREBASE_API_KEY_PROD }}" >> "$GITHUB_OUTPUT"
            echo "auth_enabled=${{ vars.AUTH_ENABLED_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "env_name=dev" >> "$GITHUB_OUTPUT"
            echo "project=${{ vars.GCP_PROJECT_ID_DEV }}" >> "$GITHUB_OUTPUT"
            echo "deployer_sa=${{ vars.GCP_DEPLOYER_SA_DEV }}" >> "$GITHUB_OUTPUT"
            echo "runtime_sa=itr-app@${{ vars.GCP_PROJECT_ID_DEV }}.iam.gserviceaccount.com" >> "$GITHUB_OUTPUT"
            echo "cloud_sql_instance=${{ vars.GCP_PROJECT_ID_DEV }}:${{ vars.GCP_REGION }}:itr-postgres-dev" >> "$GITHUB_OUTPUT"
            echo "gmail_secrets_part=" >> "$GITHUB_OUTPUT"
            echo "stripe_publishable_key=pk_test_51JxjLSDGT6bz5bfXKhpVK9a7sqDGYjjFyWPjgZUQBIMJxdBaHkxVzjK69jPis4wL9Q4L8Eh0ChRZIFMhb9kIZraT009io4Exf7" >> "$GITHUB_OUTPUT"
            echo "firebase_project_id=${{ vars.GCP_PROJECT_ID_DEV }}" >> "$GITHUB_OUTPUT"
            echo "firebase_auth_domain=${{ vars.FIREBASE_AUTH_DOMAIN_DEV }}" >> "$GITHUB_OUTPUT"
            echo "firebase_api_key=${{ vars.FIREBASE_API_KEY_DEV }}" >> "$GITHUB_OUTPUT"
            echo "auth_enabled=${{ vars.AUTH_ENABLED_DEV }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Auth to GCP via WIF
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.env.outputs.deployer_sa }}

      - name: Set up gcloud
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build
        if: github.event_name != 'pull_request'
        run: |
          gcloud builds submit \
            --project=${{ steps.env.outputs.project }} \
            --region=${{ vars.GCP_REGION }} \
            --service-account=projects/${{ steps.env.outputs.project }}/serviceAccounts/${{ steps.env.outputs.deployer_sa }} \
            --config=infra/cloudbuild.yaml \
            '--substitutions=^|^COMMIT_SHA=${{ github.sha }}|_PROJECT=${{ steps.env.outputs.project }}|_REGION=${{ vars.GCP_REGION }}|_SERVICE=itr-client-hq|_RUNTIME_SA=${{ steps.env.outputs.runtime_sa }}|_CLOUD_SQL_INSTANCE=${{ steps.env.outputs.cloud_sql_instance }}|_GMAIL_SECRETS_PART=${{ steps.env.outputs.gmail_secrets_part }}|_STRIPE_PUBLISHABLE_KEY=${{ steps.env.outputs.stripe_publishable_key }}|_AUTH_ENABLED=${{ steps.env.outputs.auth_enabled }}|_FIREBASE_PROJECT_ID=${{ steps.env.outputs.firebase_project_id }}|_FIREBASE_AUTH_DOMAIN=${{ steps.env.outputs.firebase_auth_domain }}|_FIREBASE_API_KEY=${{ steps.env.outputs.firebase_api_key }}' \
            .
